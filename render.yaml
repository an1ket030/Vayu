services:
  - type: web
    name: cleanair-backend
    env: node
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: npm install --include=dev && npm run prisma:generate && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: cleanair-redis
          property: connectionString
      - key: FRONTEND_URL
        sync: false
      - key: ML_SERVICE_URL
        fromService:
          name: cleanair-ml
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: WAQI_TOKEN
        sync: false
      - key: OWM_API_KEY
        sync: false
      - key: ORS_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false

  - type: web
    name: cleanair-ml
    env: docker
    region: singapore
    plan: free
    rootDir: ml-service
    dockerfilePath: ./Dockerfile
    envVars:
      - key: PORT
        value: 8000

  - type: redis
    name: cleanair-redis
    region: singapore
    plan: free
    ipAllowList: []
    maxmemoryPolicy: noeviction
